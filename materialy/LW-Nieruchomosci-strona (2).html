document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

180px; margin:0 auto; display:flex; flex-wrap:wrap; gap:clamp(30px,4vw,60px); align-items:center;\">\n              <div style=\"flex:1 1 320px; min-width:280px;\">\n                <div style=\"position:relative; border-radius:20px; overflow:hidden; box-shadow:0 18px 44px rgba(60,44,20,.14);\">\n                  <div style=\"aspect-ratio:5/4; background:repeating-linear-gradient(135deg,#e7ddc7 0,#e7ddc7 13px,#ded3ba 13px,#ded3ba 26px); display:flex; align-items:center; justify-content:center; color:#a5987b; font-family:'IBM Plex Mono',monospace; font-size:12px;\">zdjęcie · zespół LW<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1 1 380px; min-width:290px;\">\n                <div style=\"display:flex; align-items:center; gap:9px; color:#8a7f6a; font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;\"><span style=\"width:22px; height:1.5px; background:#b08d57;\"><\u002Fspan>O nas<\u002Fdiv>\n                <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:clamp(27px,3.6vw,42px); color:#2c2822; line-height:1.14; margin:14px 0 0; letter-spacing:-.01em;\">Z sercem do ludzi i&nbsp;domów<\u002Fh2>\n                <p style=\"color:#6f685c; font-size:16px; line-height:1.68; margin:18px 0 0;\">Jesteśmy lokalnym biurem nieruchomości z Jeleniej Góry, które powstało z pasji do pracy z ludźmi i miłości do miejsc, w których można naprawdę poczuć się jak w domu.<\u002Fp>\n                <p style=\"color:#6f685c; font-size:16px; line-height:1.68; margin:14px 0 0;\">Stawiamy na uczciwość, empatię i elastyczne podejście. Słuchamy, doradzamy i prowadzimy Cię krok po kroku przez cały proces — byś na każdym etapie czuł się pewnie i spokojnie.<\u002Fp>\n                <div style=\"display:flex; flex-wrap:wrap; gap:26px; margin-top:28px;\">\n                  <div><div style=\"font-family:'Newsreader',serif; font-size:34px; color:#3a5a40; font-weight:600;\">8 lat<\u002Fdiv><div style                <\u002Fdiv>\n\n                  <!-- Zdjęcia -->\n                  <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:16px; padding:22px 24px;\">\n                    <h3 style=\"font-family:'Newsreader',serif; font-size:18px; font-weight:600; color:#2c2822; margin:0 0 4px;\">Zdjęcia<\u002Fh3>\n                    <p style=\"color:#8a7f6a; font-size:13px; margin:0 0 16px; line-height:1.5;\">Zdjęcie oznaczone jako <strong style=\"color:#3a5a40;\">Główne<\u002Fstrong> będzie miniaturą oferty. Przeciągnij, aby zmienić kolejność.<\u002Fp>\n                    <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;\">\n                      <div style=\"aspect-ratio:4/3; border:2px dashed #d8ceb7; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:#faf6ee; cursor:pointer; color:#a89a7d;\"><span style=\"font-size:24px; line-height:1;\">+<\u002Fspan><span style=\"font-size:11px; font-family:'IBM Plex Mono',monospace;\">dodaj zdjęcia<\u002Fspan><\u002Fdiv>\n                      <sc-for list=\"{{ formPhotos }}\" as=\"p\" hint-placeholder-count=\"4\">\n                        <div style=\"{{ p.tileStyle }}\">\n                          <sc-if value=\"{{ p.isCover }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"position:absolute; top:7px; left:7px; z-index:2; background:#3a5a40; color:#f3efe4; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:999px;\">Główne<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ p.notCover }}\" hint-placeholder-val=\"{{ false }}\"><button style=\"position:absolute; bottom:7px; left:7px; z-index:2; background:rgba(255,253,248,.92); color:#3a5a40; border:none; font-size:11px; font-weight:600; padding:5px 10px; border-radius:999px; cursor:pointer;\" onclick=\"{{ p.pick }}\">Ustaw główne<\u002Fbutton><\u002Fsc-if>\n                          <button style=\"positi                <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- PRAWA: publikacja -->\n                <div style=\"flex:1 1 300px; max-width:340px; min-width:270px; position:sticky; top:16px; display:flex; flex-direction:column; gap:16px;\">\n                  <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:16px; padding:16px;\">\n                    <div style=\"font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8a7f6a; margin-bottom:10px;\">Podgląd karty<\u002Fdiv>\n                    <div style=\"border-radius:12px; overflow:hidden; border:1px solid #ece3d1;\">\n                      <div style=\"aspect-ratio:16/10; background:repeating-linear-gradient(135deg,#efe7d6 0,#efe7d6 10px,#e6dcc7 10px,#e6dcc7 20px);\"><\u002Fdiv>\n                      <div style=\"padding:12px 14px;\">\n                        <div style=\"font-family:'Newsreader',serif; font-size:15px; color:#2c2822; font-weight:600;\">Tytuł oferty<\u002Fdiv>\n                        <div style=\"color:#3a5a40; font-family:'Newsreader',serif; font-weight:600; font-size:17px; margin-top:4px;\">— zł<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:16px; padding:20px;\">\n                    <h3 style=\"font-family:'Newsreader',serif; font-size:17px; font-weight:600; color:#2c2822; margin:0 0 14px;\">Publikacja<\u002Fh3>\n                    <label style=\"display:flex; flex-direction:column; gap:7px; margin-bottom:16px;\"><span style=\"font-size:12.5px; font-weight:600; color:#4a453b;\">Status<\u002Fspan><select style=\"border:1px solid #e2d8c2; background:#faf6ee; border-radius:11px; padding:12px 14px; font-size:14px; color:#2c2822; cursor:pointer;\"><option>Aktywna<\u002Foption><option>Szkic<\u002Foption><option>Zarezerwowana<\u002Foption><option>Sprzedana<\u002Foption><\u002Fselect><\u002Flabel>\n                    <div style=\"height:1px; background:#f1ead9; margin-bottom:16px;\"><\u002Fdiv>\n                    <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                      <sc-for list=\"{{ pubFlags }}\" as=\"f\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex; align-items:flex-start; gap:12px;\">\n                          <div style=\"flex:1; min-width:0;\"><div style=\"font-weight:600; color:#2c2822; font-size:14px;\">{{ f.label }}<\u002Fdiv><div style=\"color:#8a7f6a; font-size:12px; margin-top:3px; line-height:1.4;\">{{ f.desc }}<\u002Fdiv><\u002Fdiv>\n                          <button style=\"{{ f.track }}\" onclick=\"{{ f.toggle }}\"><span style=\"{{ f.knob }}\"><\u002Fspan><\u002Fbutton>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"height:1px; background:#f1ead9; margin:18px 0;\"><\u002Fdiv>\n                    <button style=\"width:100%; background:#3a5a40; color:#f3efe4; border:none; padding:13px; border-radius:11px; font-weight:600; font-size:14.5px; cursor:pointer;\" onclick=\"{{ tabOfertyFn }}\">Zapisz i opublikuj<\u002Fbutton>\n                    <button style=\"width:100%; margin-top:9px; background:transparent; border:1px solid #d5cbb6; color:#2c2822; padding:12px; border-radius:11px; font-weight:600; font-size:14px; cursor:pointer;\" onclick=\"{{ tabOfertyFn }}\">Zapisz szkic<\u002Fbutton>\n                    <button style=\"width:100%; margin-top:9px; background:transparent; border:none; color:#8a7f6a; padding:8px; font-weight:600; font-size:13.5px; cursor:pointer;\" onclick=\"{{ tabOfertyFn }}\">Anuluj<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- CMS: UZYTKOWNICY -->\n              <sc-if value=\"{{ tabUsers }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:760px;\">\n                <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:16px; overflow:hidden; margin-bottom:22px;\">\n                  <sc-for list=\"{{ users }}\" as=\"u\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex; align-items:center; gap:14px; padding:16px 20px; border-bottom:1px solid #f1ead9;\">\n                      <div style=\"width:44px; height:44px; border-radius:50%; background:#3a5a40; color:#f3efe4; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; flex:none;\">{{ u.initials }}<\u002Fdiv>\n                      <div style=\"flex:1; min-width:0;\"><div style=\"font-weight:600; color:#2c2822; font-size:15px;\">{{ u.name }}<\u002Fdiv><div style=\"color:#8a7f6a; font-size:13px;\">{{ u.email }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"{{ u.roleStyle }}\">{{ u.role }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:16px; padding:24px;\">\n                  <h3 style=\"font-family:'Newsreader',serif; font-size:19px; font-weight:600; color:#2c2822; margin:0 0 16px;\">Dodaj użytkownika<\u002Fh3>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;\">\n                    <label style=\"flex:1 1 180px; display:flex; flex-direction:column; gap:7px;\"><span style=\"font-size:12.5px; font-weight:600; color:#4a453b;\">Imię i nazwisko<\u002Fspan><input ref=\"{{ uNameRef }}\" placeholder=\"np. Karolina Nowak\" style=\"border:1px solid #e2d8c2; background:#faf6ee; border-radius:11px; padding:12px 14px; font-size:14px; color:#2c2822;\"><\u002Flabel>\n                    <label style=\"flex:1 1 180px; display:flex; flex-direction:column; gap:7px;\"><span style=\"font-size:12.5px; font-weight:600; color:#4a453b;\">E-mail<\u002Fspan><input ref=\"{{ uEmailRef }}\" placeholder=\"imie@lw.nieruchomosci.pl\" style=\"border:1px solid #e2d8c2; background:#faf6ee; border-radius:11px; padding:12px 14px; font-size:14px; color:#2c2822;\"><\u002Flabel>\n                    <label style=\"flex:0 1 150px; display:flex; flex-direction:column; gap:7px;\"><span style=\"font-size:12.5px; font-weight:600; color:#4a453b;\">Rola<\u002Fspan><select ref=\"{{ uRoleRef }}\" style=\"border:1px solid #e2d8c2; background:#faf6ee; border-radius:11px; padding:12px 14px; font-size:14px; color:#2c2822; cursor:pointer;\"><option>Agent<\u002Foption><option>Administrator<\u002Foption><\u002Fselect><\u002Flabel>\n                    <button style=\"background:#3a5a40; color:#f3efe4; border:none; padding:13px 24px; border-radius:11px; font-weight:600; font-size:14.5px; cursor:pointer; height:46px;\" onclick=\"{{ addUser }}\">Dodaj<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- CMS: ZGLOSZENIA -->\n              <sc-if value=\"{{ tabZgl }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:860px;\">\n                <p style=\"color:#6f685c; font-size:14px; margin:0 0 18px;\">Zgłoszenia od klientów ze strony — kliknij status, aby zmienić (Nowe → W toku → Obsłużone).<\u002Fp>\n                <div style=\"display:flex; flex-direction:column; gap:12px;\">\n                  <sc-for list=\"{{ subsView }}\" as=\"s\" hint-placeholder-count=\"4\">\n                    <div style=\"background:#fffdf8; border:1px solid #ece3d1; border-radius:14px; padding:18px 20px;\">\n                      <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap;\">\n                        <div style=\"display:flex; align-items:center; gap:12px;\">\n                          <div style=\"width:42px; height:42px; border-radius:50%; background:#eef1e8; color:#3a5a40; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; flex:none;\">{{ s.init }}<\u002Fdiv>\n                          <div>\n                            <div style=\"font-weight:600; color:#2c2822; font-size:15px;\">{{ s.name }}<\u002Fdiv>\n                            <div style=\"display:flex; align-items:center; gap:8px; margin-top:3px;\"><span style=\"{{ s.typeStyle }}\">{{ s.type }}<\u002Fspan><span style=\"color:#a89a7d; font-size:12.5px;\">{{ s.date }}<\u002Fspan><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                        <button style=\"{{ s.statusStyle }}\" onclick=\"{{ s.cycle }}\">{{ s.status }}<\u002Fbutton>\n                      <\u002Fdiv>\n                      <div style=\"font-family:'Newsreader',serif; font-size:16px; color:#3a352c; margin:14px 0 8px;\">{{ s.subject }}<\u002Fdiv>\n                      <div style=\"display:flex; align-items:center; gap:8px; color:#6f685c; font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#b08d57; flex:none;\"><\u002Fspan>Kontakt: {{ s.contact }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n            <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      view: 'home',\n      device: 'desktop',\n      menuOpen: false,\n      cmsAuth: false,\n      cmsTab: 'oferty',\n      currentId: 1,\n      form: { featured: true, highlighted: false, exclusive: false, cover: 0 },\n      amenities: { 'Balkon': true, 'Taras': true, 'Garaż': true },\n      offers: [\n        {id:1, type:'Dom', title:'Nowy bliźniak z tarasem i widokiem na góry', loc:'Mysłakowice, jeleniogórski', price:'740 000', old:'775 000', area:'83', rooms:'4', badge:'Okazja', status:'Aktywna', ph:'dom · taras · widok'},\n        {id:2, type:'Mieszkanie', title:'2 pokojowe z balkonem', loc:'Jelenia Góra, Piłsudskiego', price:'340 000', old:'360 000', area:'71,8', rooms:'2', badge:'Na wyłączność', status:'Na wyłączność', ph:'mieszkanie · balkon'},\n        {id:3, type:'Działka', title:'4 działki budowlane, Cieplice', loc:'Jelenia Góra', price:'325 000', old:'', area:'1 211', rooms:'', badge:'Na wyłączność', status:'Na wyłączność', ph:'działka · las'},\n        {id:4, type:'Działka', title:'Duża działka widokowa w Sosnówce', loc:'Sosnówka, Podgórzyn', price:'1 844 640', old:'', area:'10 248', rooms:'', badge:'Na wyłączność', status:'Aktywna', ph:'działka · widok'},\n        {id:5, type:'Działka', title:'Działka pod budowę 10 domów', loc:'Sosnówka, Podgórzyn', price:'2 385 000', old:'', area:'13 250', rooms:'', badge:'Inwestycja', status:'Aktywna', ph:'inwestycja · WZ'},\n        {id:6, type:'Działka', title:'Atrakcyjna działka w Sosnówce', loc:'Sosnówka, Podgórzyn', price:'740 000', old:'', area:'4 122', rooms:'', badge:'Na wyłączność', status:'Aktywna', ph:'działka'},\n        {id:7, type:'Działka', title:'Działka widokowa w Sosnówce', loc:'Sosnówka, Podgórzyn', price:'1 650 000', old:'', area:'9 220', rooms:'', badge:'', status:'Aktywna', ph:'działka · widok'},\n        {id:8, type:'Mieszkanie', title:'3 pokojowe w poszukiwanej dzielnicy', loc:'Jelenia Góra', price:'519 000', old:'', area:'60,3', rooms:'3', badge:'', status:'Aktywna', ph:'mieszkanie · 1 piętro'},\n        {id:9, type:'Dom', title:'Dom w zabudowie szeregowej, Moniuszki', loc:'Jelenia Góra', price:'1 399 000', old:'', area:'255', rooms:'6', badge:'', status:'Aktywna', ph:'dom · szeregowiec'},\n        {id:10, type:'Dom', title:'Nowoczesny segment szeregówki, Cieplice', loc:'Jelenia Góra', price:'1 259 000', old:'', area:'120', rooms:'4', badge:'', status:'Aktywna', ph:'dom nowoczesny'},\n        {id:11, type:'Mieszkanie', title:'Mieszkanie ul. Szymanowskiego, 3 pokoje', loc:'Jelenia Góra', price:'359 000', old:'', area:'50,1', rooms:'3', badge:'Nowość', status:'Szkic', ph:'mieszkanie · balkon'},\n        {id:12, type:'Mieszkanie', title:'Mieszkanie Zabobrze, 2 pokoje, loggia', loc:'Jelenia Góra', price:'348 000', old:'', area:'51,6', rooms:'2', badge:'Nowość', status:'Aktywna', ph:'mieszkanie'}\n      ],\n      users: [\n        {name:'Anna Wolska', email:'anna@lw.nieruchomosci.pl', role:'Administrator', initials:'AW'},\n        {name:'Karolina Nowak', email:'karolina@lw.nieruchomosci.pl', role:'Agent', initials:'KN'}\n      ],\n      submissions: [\n        {name:'Marek Kowalski', type:'Zgłoszenie oferty', subject:'Mam do sprzedania mieszkanie 3 pok, Zabobrze', contact:'+48 601 234 567', date:'2 lip', status:'Nowe', init:'MK'},\n        {name:'Ewa Zielińska', type:'Poszukiwanie', subject:'Szukam domu do 900 tys. w okolicy Cieplic', contact:'ewa.zielinska@gmail.com', date:'1 lip', status:'Nowe', init:'EZ'},\n        {name:'Tomasz Lis', type:'Zgłoszenie oferty', subject:'Działka budowlana w Sosnówce, ok. 8 arów', contact:'+48 500 100 200', date:'28 cze', status:'W toku', init:'TL'},\n        {name:'Anna Nowicka', type:'Poszukiwanie', subject:'Kawalerka pod inwestycję, centrum JG', contact:'+48 692 887 771', date:'25 cze', status:'Obsłużone', init:'AN'}\n      ]\n    };\n    this.uNameRef = React.createRef();\n    this.uEmailRef = React.createRef();\n    this.uRoleRef = React.createRef();\n  }\n\n  toTop(){ try { window.scrollTo({top:0, behavior:'auto'}); } catch(e){} }\n  scrollTo(id){ const el = document.getElementById(id); if(el){ const y = el.getBoundingClientRect().top + window.pageYOffset - 68; window.scrollTo({top:y, behavior:'smooth'}); } }\n  setView(v){ this.setState({view:v, menuOpen:false}); this.toTop(); }\n  goSection(id){ if(this.state.view !== 'home'){ this.setState({view:'home', menuOpen:false}, ()=> setTimeout(()=> this.scrollTo(id), 70)); } else { this.setState({menuOpen:false}); this.scrollTo(id); } }\n  openOffer(id){ this.setState({view:'detail', currentId:id, cmsTab:'oferty'}); this.toTop(); }\n  deleteOffer(id){ this.setState(s=>({offers: s.offers.filter(o=>o.id!==id)})); }\n  addUser(){\n    const n = this.uNameRef.current; if(!n || !n.value.trim()) return;\n    const name = n.value.trim();\n    const parts = name.split(/\\s+/);\n    const initials = (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();\n    const email = (this.uEmailRef.current && this.uEmailRef.current.value.trim()) || '—';\n    const role = (this.uRoleRef.current && this.uRoleRef.current.value) || 'Agent';\n    this.setState(s=>({users:[...s.users, {name, email, role, initials}]}));\n    this.uNameRef.current.value=''; if(this.uEmailRef.current) this.uEmailRef.current.value='';\n  }\n  cycleSub(i){\n    const order = ['Nowe','W toku','Obsłużone'];\n    this.setState(s=>{ const subs=[...s.submissions]; const cur=order.indexOf(subs[i].status); subs[i]={...subs[i], status: order[(cur+1)%3]}; return {submissions:subs}; });\n  }\n  toggleForm(k){ this.setState(s=>({form: {...s.form, [k]: !s.form[k]}})); }\n  setCover(i){ this.setState(s=>({form: {...s.form, cover: i}})); }\n  toggleAmenity(n){ this.setState(s=>{ const a={...s.amenities}; if(a[n]) delete a[n]; else a[n]=true; return {amenities:a}; }); }\n  fmtNum(n){ return String(n).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' '); }\n  flagChip(bg,fg){ return 'display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; background:'+bg+'; color:'+fg+';'; }\n  switchTrack(on){ return 'position:relative; width:44px; height:24px; border-radius:999px; border:none; cursor:pointer; flex:none; padding:0; background:'+(on?'#3a5a40':'#ddd3bf')+';'; }\n  switchKnob(on){ return 'position:absolute; top:3px; left:'+(on?'23px':'3px')+'; width:18px; height:18px; border-radius:50%; background:#fffdf8; box-shadow:0 1px 2px rgba(0,0,0,.2);'; }\n  chipToggle(on){ return 'display:inline-flex; align-items:center; gap:6px; padding:8px 13px; border-radius:999px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid '+(on?'#bcd0bd':'#e2d8c2')+'; background:'+(on?'#e7efe4':'#faf6ee')+'; color:'+(on?'#3a5a40':'#6f685c')+';'; }\n\n  statusStyle(status){\n    const base = 'display:inline-flex; align-items:center; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:600; flex:none; cursor:pointer; border:none;';\n    if(status==='Aktywna' || status==='Obsłużone') return base + 'background:#e7efe4; color:#3a5a40;';\n    if(status==='Na wyłączność') return base + 'background:#f3ead9; color:#9a7433;';\n    if(status==='Szkic') return base + 'background:#efe9e0; color:#8a7f6a;';\n    if(status==='Nowe') return base + 'background:#f6e7de; color:#c46b3f;';\n    if(status==='W toku') return base + 'background:#eae7f0; color:#6a5a9a;';\n    return base + 'background:#efe9e0; color:#6f685c;';\n  }\n  typeStyle(type){\n    const base = 'display:inline-flex; padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:600;';\n    return type==='Poszukiwanie' ? base+'background:#eae7f0; color:#6a5a9a;' : base+'background:#eef1e8; color:#3a5a40;';\n  }\n  roleStyle(role){\n    const base = 'display:inline-flex; padding:5px 13px; border-radius:999px; font-size:12px; font-weight:600; flex:none;';\n    return role==='Administrator' ? base+'background:#3a5a40; color:#f3efe4;' : base+'background:#eef1e8; color:#3a5a40;';\n  }\n  ctrlBtn(active, green){\n    const on = green ? '#3a5a40' : '#4a4a3e';\n    return 'padding:7px 15px; border-radius:999px; border:none; cursor:pointer; font-family:Figtree, sans-serif; font-size:13px; font-weight:600; background:'+(active?on:'transparent')+'; color:'+(active?'#f3efe4':'#b8b2a2')+';';\n  }\n  tabBtn(active){\n    return 'display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:10px; border:none; cursor:pointer; width:100%; text-align:left; font-family:Figtree, sans-serif; font-size:14px; font-weight:500; background:'+(active?'#2c382a':'transparent')+'; color:'+(active?'#f3efe4':'#9aa691')+';';\n  }\n\n  renderVals(){\n    const st = this.state;\n    const isMobile = st.device === 'mobile';\n    const FEAT = new Set([1,2,8]);\n    const HIGH = new Set([1,4,11]);\n    const meta = o => {\n      const priceNum = Number(String(o.price).replace(/[^\\d]/g,''));\n      const areaNum = Number(String(o.area).replace(/\\s/g,'').replace(',','.'));\n      const ppm = areaNum ? Math.round(priceNum/areaNum) : 0;\n      const featured = FEAT.has(o.id);\n      const highlighted = HIGH.has(o.id);\n      const flags = [];\n      if(featured) flags.push({t:'Polecana', s:this.flagChip('#e7efe4','#3a5a40')});\n      if(highlighted) flags.push({t:'Wyróżniona', s:this.flagChip('#f3ead9','#9a7433')});\n      return {\n        ...o,\n        priceLbl: o.price + ' zł',\n        oldLbl: o.old ? o.old + ' zł' : '',\n        hasOld: !!o.old,\n        areaLbl: o.area + ' m²',\n        roomsLbl: o.rooms ? o.rooms + ' pok.' : '',\n        roomsOr: o.rooms ? o.rooms : '—',\n        hasRooms: !!o.rooms,\n        hasBadge: !!o.badge,\n        pricePerMLbl: ppm ? this.fmtNum(ppm) + ' zł/m²' : '—',\n        imgLbl: (4 + (o.id % 6)) + ' zdj.',\n        featured, highlighted, flags, hasFlags: flags.length > 0,\n        statusStyle: this.statusStyle(o.status),\n        open: () => this.openOffer(o.id),\n        del: () => this.deleteOffer(o.id)\n      };\n    };\n    const offersView = st.offers.map(meta);\n    const featured = offersView.slice(0, 6);\n    const cur = meta(st.offers.find(o=>o.id===st.currentId) || st.offers[0]);\n\n    const cnt = t => st.offers.filter(o=>o.type===t).length;\n    const catLbl = c => c===0 ? 'Wkrótce' : (c + (c===1?' oferta':(c<5?' oferty':' ofert')));\n    const h = React.createElement;\n    const P = d => h('path', {d, key:d});\n    const R = (x,y,w,hh,extra) => h('rect', Object.assign({x,y,width:w,height:hh,key:'r'+x+y+w+hh}, extra||{}));\n    const svg = kids => h('svg', {width:26, height:26, viewBox:'0 0 24 24', fill:'none', stroke:'#3a5a40', strokeWidth:1.7, strokeLinecap:'round', strokeLinejoin:'round'}, kids);\n    const iconMieszkania = svg([ R(5,3,14,18,{rx:1.5}), R(8.3,6.5,2,2,{rx:.3}), R(13.7,6.5,2,2,{rx:.3}), R(8.3,11,2,2,{rx:.3}), R(13.7,11,2,2,{rx:.3}), R(10,16,4,5) ]);\n    const iconDomy = svg([ P('M4 11l8-6 8 6'), P('M6 10v9h12v-9'), P('M10 19v-5h4v5') ]);\n    const iconDzialki = svg([ P('M12 21s6.3-5.6 6.3-10.4A6.3 6.3 0 1 0 5.7 10.6C5.7 15.4 12 21 12 21z'), h('circle',{cx:12,cy:10,r:2.3,key:'c'}) ]);\n    const iconLokale = svg([ P('M4 9l1.3-4h13.4L20 9'), P('M5.2 9v10h13.6V9'), P('M10 19v-6h4v6') ]);\n    const categories = [\n      {name:'Mieszkania', cntLbl: catLbl(cnt('Mieszkanie')), icon: iconMieszkania},\n      {name:'Domy', cntLbl: catLbl(cnt('Dom')), icon: iconDomy},\n      {name:'Działki', cntLbl: catLbl(cnt('Działka')), icon: iconDzialki},\n      {name:'Lokale', cntLbl: catLbl(cnt('Lokal')), icon: iconLokale}\n    ];\n\n    const stats = [\n      {n:'120+', l:'sprzedanych nieruchomości'},\n      {n:'8 lat', l:'na lokalnym rynku'},\n      {n:'250+', l:'zadowolonych klientów'},\n      {n:'4,9', l:'średnia ocena Google'}\n    ];\n    const regionFeatures = [\n      {t:'Lokalni na wskroś', d:'Mieszkamy i pracujemy w Kotlinie Jeleniogórskiej. Znamy każdą dzielnicę, drogę i widok na Karkonosze.'},\n      {t:'Mobilne biuro', d:'Przyjeżdżamy do Ciebie — na nieruchomość, do domu, do kawiarni. Wygodnie i bez pośpiechu.'},\n      {t:'Oferty na wyłączność', d:'Wiele naszych nieruchomości znajdziesz tylko u nas. Dbamy o nie jak o własne.'},\n      {t:'Z sercem do ludzi', d:'Słuchamy, doradzamy i prowadzimy przez cały proces — uczciwie i spokojnie.'}\n    ];\n    const testimonials = [\n      {q:'Sprzedaż mieszkania poszła sprawnie i bez stresu. Czułam, że ktoś naprawdę o mnie dba.', name:'Joanna K.', loc:'Jelenia Góra', init:'JK'},\n      {q:'Znaleźli nam działkę z widokiem na góry — dokładnie taką, o jakiej marzyliśmy.', name:'Michał i Ola', loc:'Sosnówka', init:'MO'},\n      {q:'Profesjonalnie, ciepło i konkretnie. Cały czas wiedziałem, co dzieje się z moją ofertą.', name:'Robert W.', loc:'Cieplice', init:'RW'}\n    ];\n\n    const users = st.users.map(u => ({...u, roleStyle: this.roleStyle(u.role)}));\n    const subsView = st.submissions.map((s,i) => ({...s, statusStyle: this.statusStyle(s.status), typeStyle: this.typeStyle(s.type), cycle: () => this.cycleSub(i)}));\n    const newCount = st.submissions.filter(s=>s.status==='Nowe').length;\n\n    const cover = st.form.cover;\n    const formPhotos = [0,1,2,3].map(i => ({ idx:i, isCover: cover===i, notCover: cover!==i, pick: () => this.setCover(i), tileStyle: 'position:relative; aspect-ratio:4/3; border-radius:12px; overflow:hidden; background:repeating-linear-gradient(135deg,#efe7d6 0,#efe7d6 9px,#e6dcc7 9px,#e6dcc7 18px); '+(cover===i ? 'box-shadow:0 0 0 3px #3a5a40;' : 'box-shadow:0 0 0 1px #e2d8c2;') }));\n    const amenityList = ['Balkon','Taras','Ogród','Garaż','Miejsce postojowe','Winda','Piwnica','Klimatyzacja','Ogrzewanie miejskie','Kominek','Umeblowane','Monitoring','Ochrona','Nowe budownictwo'];\n    const amenitiesView = amenityList.map(n => { const on = !!st.amenities[n]; return { name:n, on, toggle: () => this.toggleAmenity(n), style: this.chipToggle(on) }; });\n    const pfDefs = [\n      {key:'featured', label:'Polecana oferta', desc:'Widoczna w sekcji „Polecane\" na stronie głównej'},\n      {key:'highlighted', label:'Wyróżniona', desc:'Ramka i etykieta na liście ofert'},\n      {key:'exclusive', label:'Na wyłączność', desc:'Oferta prowadzona wyłącznie przez LW'}\n    ];\n    const pubFlags = pfDefs.map(f => { const on = !!st.form[f.key]; return {...f, on, track: this.switchTrack(on), knob: this.switchKnob(on), toggle: () => this.toggleForm(f.key)}; });\n\n    const cmsTitles = {oferty:'Oferty', dodaj:'Dodaj ofertę', users:'Użytkownicy', zgloszenia:'Zgłoszenia'};\n\n    return {\n      // frame / chrome\n      frameMax: isMobile ? '404px' : '1240px',\n      showSite: st.view==='home' || st.view==='listing' || st.view==='detail',\n      isCms: st.view==='cms',\n      isHome: st.view==='home',\n      isListing: st.view==='listing',\n      isDetail: st.view==='detail',\n      headerDesktop: !isMobile,\n      headerMobile: isMobile,\n      menuOpen: st.menuOpen,\n      sCtrlHome: this.ctrlBtn(st.view==='home', true),\n      sCtrlList: this.ctrlBtn(st.view==='listing' || st.view==='detail', true),\n      sCtrlCms: this.ctrlBtn(st.view==='cms', true),\n      sDevD: this.ctrlBtn(!isMobile, false),\n      sDevM: this.ctrlBtn(isMobile, false),\n      // nav handlers\n      goHome: () => this.setView('home'),\n      goList: () => this.setView('listing'),\n      goCms: () => this.setView('cms'),\n      goAbout: () => this.goSection('o-nas'),\n      goRegion: () => this.goSection('region'),\n      goKontakt: () => this.goSection('kontakt'),\n      goAddCta: () => this.goSection('cta'),\n      toggleMenu: () => this.setState(s=>({menuOpen:!s.menuOpen})),\n      setDeskt: () => this.setState({device:'desktop', menuOpen:false}),\n      setMob: () => this.setState({device:'mobile'}),\n      // data\n      categories, featured, offersView, stats, regionFeatures, testimonials, cur,\n      offerCount: st.offers.length,\n      activeCount: st.offers.filter(o=>o.status==='Aktywna').length,\n      featuredCount: offersView.filter(o=>o.featured).length,\n      formPhotos, amenitiesView, pubFlags,\n      // cms\n      cmsLogin: !st.cmsAuth,\n      cmsPanel: st.cmsAuth,\n      doLogin: () => this.setState({cmsAuth:true}),\n      doLogout: () => this.setState({cmsAuth:false}),\n      sidebarW: isMobile ? '62px' : '236px',\n      sidebarFull: !isMobile,\n      cmsTitle: cmsTitles[st.cmsTab] || 'Panel',\n      tabOferty: st.cmsTab==='oferty',\n      tabDodaj: st.cmsTab==='dodaj',\n      tabUsers: st.cmsTab==='users',\n      tabZgl: st.cmsTab==='zgloszenia',\n      sTabOferty: this.tabBtn(st.cmsTab==='oferty'),\n      sTabDodaj: this.tabBtn(st.cmsTab==='dodaj'),\n      sTabUsers: this.tabBtn(st.cmsTab==='users'),\n      sTabZgl: this.tabBtn(st.cmsTab==='zgloszenia'),\n      tabOfertyFn: () => this.setState({cmsTab:'oferty'}),\n      tabDodajFn: () => this.setState({cmsTab:'dodaj'}),\n      tabUsersFn: () => this.setState({cmsTab:'users'}),\n      tabZglFn: () => this.setState({cmsTab:'zgloszenia'}),\n      users, subsView, newCount, hasNew: newCount>0,\n      uNameRef: this.uNameRef, uEmailRef: this.uEmailRef, uRoleRef: this.uRoleRef,\n      addUser: () => this.addUser()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
